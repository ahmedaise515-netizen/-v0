<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعليم سواقة باحتراف - الكابتن محمد صابر</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
  body{background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#ffffff12;backdrop-filter:blur(12px);border:1px solid #ffffff22;border-radius:20px;padding:30px;max-width:420px;width:100%;box-shadow:0 10px 30px #00040}
  h1{font-size:26px;text-align:center;margin-bottom:5px}
  .sub{color:#cbd5e1;text-align:center;margin-bottom:25px;font-size:14px}
  label{display:block;margin:12px 0 6px;font-size:14px}
  input{width:100%;padding:12px;border-radius:10px;border:1px solid #ffffff30;background:#0b1220;color:#fff;outline:none;font-size:15px}
  input:focus{border-color:#38bdf8}
  button{width:100%;padding:14px;margin-top:18px;border:none;border-radius:12px;background:#22c55e;color:#fff;font-weight:bold;font-size:16px;cursor:pointer;transition:.2s}
  button:hover{background:#16a34a}
  .contact{margin-top:20px;text-align:center}
  .contact a{display:inline-block;padding:12px 20px;background:#25D366;border-radius:10px;color:#fff;text-decoration:none;font-weight:bold}
  .note{font-size:12px;color:#94a3b8;text-align:center;margin-top:12px}
  .success{display:none;margin-top:12px;padding:10px;background:#22c55e22;border:1px solid #22c55e;border-radius:8px;text-align:center}
</style>
</head>
<body>
  <div class="card">
    <h1>تعليم سواقة باحتراف</h1>
    <p class="sub">مع الكابتن محمد صابر - مدرب معتمد</p>
    
    <form id="form">
      <label>اسمك الثلاثي</label>
      <input type="text" id="name" placeholder="اكتب اسمك كامل" required>
      
      <label>كام سنة</label>
      <input type="number" id="age" placeholder="مثال: 22" min="16" max="80" required>
      
      <label>رقم الهاتف</label>
      <input type="tel" id="phone" placeholder="01xxxxxxxxx" required>
      
      <button type="submit">سجل مع الكابتن واتواصل واتساب</button>
    </form>
    
    <div class="success" id="ok">تم تجهيز الرسالة ✅ دوس على زر الواتساب تحت</div>
    
    <div class="contact">
      <p style="margin-bottom:8px">أو تواصل مباشر مع الكابتن:</p>
      <a id="whatsapp" href="#" target="_blank">كلم الكابتن محمد على واتساب</a>
      <p class="note">رقم الكابتن: 01109389711</p>
    </div>
  </div>

<script>
const form = document.getElementById('form');
const ok = document.getElementById('ok');
const waBtn = document.getElementById('whatsapp');
const captainPhone = '201109389711'; // 01109389711 باضافة كود مصر 20

form.addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const age = document.getElementById('age').value;
  const phone = document.getElementById('phone').value.trim();
  
  const msg = `السلام عليكم كابتن محمد%0Aانا عايز اسجل مع حضرتك اتعلم سواقة%0A%0Aالاسم: ${name}%0Aالسن: ${age} سنة%0Aرقمي: ${phone}`;
  
  waBtn.href = `https://wa.me/${captainPhone}?text=${msg}`;
  ok.style.display = 'block';
  waBtn.click(); // يفتح الواتساب على طول
});
</script>
</body>
</html>
